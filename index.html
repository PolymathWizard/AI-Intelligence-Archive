// 
// THREAT SPHERE — Canvas orbital visualization
// 

function ThreatSphere({ events, onSelectEntity }) {
  const canvasRef = useRef(null);
  const animRef = useRef(null);
  const nodesRef = useRef([]);
  const mouseRef = useRef({ x: 0, y: 0 });
  const hoveredRef = useRef(null);
  const [hovered, setHovered] = useState(null);

  const entityData = useMemo(() => {
    const freq = {};
    events.forEach(ev => ev.entities.forEach(ent => {
      if (!freq[ent]) freq[ent] = { name: ent, count: 0, categories: new Set(), impacts: [] };
      freq[ent].count++;
      freq[ent].categories.add(ev.category);
      freq[ent].impacts.push(ev.impact);
    }));
    return Object.values(freq).sort((a, b) => b.count - a.count);
  }, [events]);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const W = canvas.width = canvas.offsetWidth * 2;
    const H = canvas.height = canvas.offsetHeight * 2;
    ctx.scale(1, 1);
    const cx = W / 2, cy = H / 2;

    // Initialize nodes in orbital positions
    nodesRef.current = entityData.map((d, i) => {
      const info = ENTITIES[d.name] || { color: "#94A3B8", short: d.name.substring(0, 4) };
      const threatScore = d.impacts.filter(im => im === "critical").length / d.count;
      const ring = d.count >= 4 ? 1 : d.count >= 2 ? 2 : 3;
      const radius = ring === 1 ? Math.min(W, H) * 0.15 : ring === 2 ? Math.min(W, H) * 0.27 : Math.min(W, H) * 0.37;
      const angleOffset = (i / entityData.length) * Math.PI * 2 + Math.random() * 0.5;
      const speed = (0.0003 + Math.random() * 0.0004) * (ring === 1 ? 1.2 : ring === 2 ? 0.8 : 0.5);
      return {
        name: d.name, short: info.short, color: info.color, count: d.count,
        threatScore, ring, radius, angle: angleOffset, speed,
        x: cx + Math.cos(angleOffset) * radius,
        y: cy + Math.sin(angleOffset) * radius,
        size: 8 + d.count * 5,
        pulsePhase: Math.random() * Math.PI * 2,
      };
    });

    let t = 0;
    const draw = () => {
      t++;
      ctx.clearRect(0, 0, W, H);

      // Orbital rings
      [0.15, 0.27, 0.37].forEach((r, i) => {
        ctx.beginPath();
        ctx.arc(cx, cy, Math.min(W, H) * r, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(30,41,59,${0.5 - i * 0.12})`;
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 8]);
        ctx.stroke();
        ctx.setLineDash([]);
      });

      // Center glow
      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 60);
      grad.addColorStop(0, "rgba(100,116,139,0.12)");
      grad.addColorStop(1, "rgba(100,116,139,0)");
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(cx, cy, 60, 0, Math.PI * 2);
      ctx.fill();

      // Scan line
      const scanAngle = (t * 0.008) % (Math.PI * 2);
      const scanGrad = ctx.createConicGradient(scanAngle, cx, cy);
      scanGrad.addColorStop(0, "rgba(74,165,212,0.06)");
      scanGrad.addColorStop(0.08, "rgba(74,165,212,0)");
      scanGrad.addColorStop(1, "rgba(74,165,212,0)");
      ctx.fillStyle = scanGrad;
      ctx.beginPath();
      ctx.arc(cx, cy, Math.min(W, H) * 0.42, 0, Math.PI * 2);
      ctx.fill();

      // Connection lines for co-occurring entities
      const evMap = {};
      events.forEach(ev => {
        ev.entities.forEach(a => {
          ev.entities.forEach(b => {
            if (a < b) {
              const k = a + "||" + b;
              evMap[k] = (evMap[k] || 0) + 1;
            }
          });
        });
      });

      const nodeMap = {};
      nodesRef.current.forEach(n => nodeMap[n.name] = n);

      Object.entries(evMap).forEach(([k, count]) => {
        const [a, b] = k.split("||");
        const na = nodeMap[a], nb = nodeMap[b];
        if (na && nb) {
          ctx.beginPath();
          ctx.moveTo(na.x, na.y);
          ctx.lineTo(nb.x, nb.y);
          ctx.strokeStyle = `rgba(100,116,139,${0.06 + count * 0.04})`;
          ctx.lineWidth = count;
          ctx.stroke();
        }
      });

      // Update and draw nodes
      let foundHover = null;
      nodesRef.current.forEach(node => {
        node.angle += node.speed;
        node.x = cx + Math.cos(node.angle) * node.radius;
        node.y = cy + Math.sin(node.angle) * node.radius;

        const pulse = 1 + Math.sin(t * 0.04 + node.pulsePhase) * 0.15 * node.threatScore;
        const drawSize = node.size * pulse;

        // Hover detection
        const dx = mouseRef.current.x * 2 - node.x;
        const dy = mouseRef.current.y * 2 - node.y;
        const isHovered = Math.sqrt(dx * dx + dy * dy) < drawSize + 15;
        if (isHovered) foundHover = node.name;

        // Node glow
        const glowGrad = ctx.createRadialGradient(node.x, node.y, 0, node.x, node.y, drawSize * 2.5);
        glowGrad.addColorStop(0, node.color + "30");
        glowGrad.addColorStop(1, node.color + "00");
        ctx.fillStyle = glowGrad;
        ctx.beginPath();
        ctx.arc(node.x, node.y, drawSize * 2.5, 0, Math.PI * 2);
        ctx.fill();

        // Threat ring for critical
        if (node.threatScore > 0.5) {
          ctx.beginPath();
          ctx.arc(node.x, node.y, drawSize + 6 + Math.sin(t * 0.06) * 3, 0, Math.PI * 2);
          ctx.strokeStyle = "#EF444460";
          ctx.lineWidth = 1.5;
          ctx.stroke();
        }

        // Node body
        ctx.beginPath();
        ctx.arc(node.x, node.y, drawSize, 0, Math.PI * 2);
        ctx.fillStyle = isHovered ? node.color : node.color + "CC";
        ctx.fill();
        if (isHovered) {
          ctx.strokeStyle = node.color;
          ctx.lineWidth = 2;
          ctx.stroke();
        }

        // Label
        ctx.font = `${isHovered ? "bold " : ""}${isHovered ? 20 : 16}px JetBrains Mono, monospace`;
        ctx.fillStyle = isHovered ? "#F1F5F9" : "#94A3B8";
        ctx.textAlign = "center";
        ctx.fillText(node.short, node.x, node.y - drawSize - 8);

        if (isHovered) {
          ctx.font = "13px JetBrains Mono, monospace";
          ctx.fillStyle = "#64748B";
          ctx.fillText(`${node.count} events`, node.x, node.y + drawSize + 18);
        }
      });

      if (foundHover !== hoveredRef.current) {
        hoveredRef.current = foundHover;
        setHovered(foundHover);
      }

      animRef.current = requestAnimationFrame(draw);
    };

    draw();
    return () => cancelAnimationFrame(animRef.current);
  }, [entityData, events]);

  const handleMouseMove = useCallback((e) => {
    const rect = canvasRef.current.getBoundingClientRect();
    mouseRef.current = { x: e.clientX - rect.left, y: e.clientY - rect.top };
  }, []);

  const handleClick = useCallback(() => {
    if (hoveredRef.current) onSelectEntity(hoveredRef.current);
  }, [onSelectEntity]);

  return (
    <div style={{ position: "relative" }}>
      <canvas
        ref={canvasRef}
        onMouseMove={handleMouseMove}
        onClick={handleClick}
        style={{
          width: "100%", height: 420, cursor: hovered ? "pointer" : "crosshair",
          borderRadius: 8, border: "1px solid #1A1D27",
        }}
      />
      <div style={{
        position: "absolute", top: 12, left: 16, fontSize: 10,
        letterSpacing: 2, color: "#475569", textTransform: "uppercase",
        pointerEvents: "none",
      }}>
        ‰ Threat Sphere — Entity Orbital Map
      </div>
      <div style={{
        position: "absolute", bottom: 12, right: 16, fontSize: 10,
        color: "#334155", pointerEvents: "none", textAlign: "right",
      }}>
        <span style={{ color: "#EF4444" }}></span> critical ring &nbsp;
        inner = high freq &nbsp; outer = low freq
      </div>
    </div>
  );
}

// 

const IMPACT_STYLES = {
  critical: { border: "#EF4444", badge: "#991B1B", badgeBg: "rgba(239,68,68,0.15)", label: "CRITICAL" },
  high: { border: "#F59E0B", badge: "#92400E", badgeBg: "rgba(245,158,11,0.15)", label: "HIGH" },
  moderate: { border: "#6B7280", badge: "#4B5563", badgeBg: "rgba(107,114,128,0.12)", label: "MODERATE" },
};
const MOMENTUM_STYLES = {
  escalating: { color: "#EF4444", bg: "#EF444418", icon: "²²" },
  accelerating: { color: "#F59E0B", bg: "#F59E0B18", icon: "²" },
  building: { color: "#6EE7B7", bg: "#6EE7B718", icon: "" },
};

function AITimeline() {
  const [activeEntities, setActiveEntities] = useState(new Set());
  const [activeCategories, setActiveCategories] = useState(new Set());
  const [expandedId, setExpandedId] = useState(null);
  const [viewMode, setViewMode] = useState("timeline");
  const [dossierEntity, setDossierEntity] = useState(null);
  const [showPrecog, setShowPrecog] = useState(true);
  const [activeThread, setActiveThread] = useState(null);

  const allEntityNames = useMemo(() => {
    const s = new Set();
    EVENTS.forEach(e => e.entities.forEach(ent => s.add(ent)));
    return [...s].sort();
  }, []);
  const allCategoryNames = useMemo(() => [...new Set(EVENTS.map(e => e.category))].sort(), []);
  const dates = useMemo(() => [...new Set(EVENTS.map(e => e.date))].sort(), []);

  const filtered = useMemo(() => {
    return EVENTS.filter(e => {
      if (activeEntities.size > 0 && !e.entities.some(ent => activeEntities.has(ent))) return false;
      if (activeCategories.size > 0 && !activeCategories.has(e.category)) return false;
      if (activeThread) {
        const thread = NARRATIVE_THREADS.find(t => t.id === activeThread);
        if (thread && !thread.eventIds.includes(e.id)) return false;
      }
      return true;
    });
  }, [activeEntities, activeCategories, activeThread]);

  const entityFreq = useMemo(() => {
    const freq = {};
    EVENTS.forEach(ev => ev.entities.forEach(ent => freq[ent] = (freq[ent] || 0) + 1));
    return Object.entries(freq).sort((a, b) => b[1] - a[1]);
  }, []);

  const entityMatrix = useMemo(() => {
    const pairs = {};
    EVENTS.forEach(ev => {
      for (let i = 0; i < ev.entities.length; i++)
        for (let j = i + 1; j < ev.entities.length; j++) {
          const key = [ev.entities[i], ev.entities[j]].sort().join("||");
          pairs[key] = (pairs[key] || 0) + 1;
        }
    });
    return Object.entries(pairs).map(([k, v]) => ({ entities: k.split("||"), count: v })).sort((a, b) => b.count - a.count);
  }, []);

  // -- ENHANCEMENT 5: SIGNAL MOMENTUM --
  const signalMomentum = useMemo(() => {
    const catByDay = {};
    EVENTS.forEach(ev => {
      if (!catByDay[ev.category]) catByDay[ev.category] = {};
      catByDay[ev.category][ev.date] = (catByDay[ev.category][ev.date] || 0) + 1;
    });
    return Object.entries(catByDay).map(([cat, days]) => {
      const vals = dates.map(d => days[d] || 0);
      const recent = vals.slice(-1)[0] || 0;
      const prev = vals.length > 1 ? vals.slice(0, -1).reduce((a, b) => a + b, 0) / (vals.length - 1) : 0;
      const delta = prev > 0 ? ((recent - prev) / prev) * 100 : recent > 0 ? 100 : 0;
      return { category: cat, values: vals, recent, delta };
    }).sort((a, b) => b.delta - a.delta);
  }, [dates]);

  const toggleEntity = ent => setActiveEntities(prev => { const n = new Set(prev); n.has(ent) ? n.delete(ent) : n.add(ent); return n; });
  const toggleCategory = cat => setActiveCategories(prev => { const n = new Set(prev); n.has(cat) ? n.delete(cat) : n.add(cat); return n; });
  const formatDate = d => new Date(d + "T12:00:00").toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });

  const isThreadHighlighted = (evId) => {
    if (!activeThread) return false;
    const thread = NARRATIVE_THREADS.find(t => t.id === activeThread);
    return thread && thread.eventIds.includes(evId);
  };

  return (
    <div style={{ minHeight: "100vh", background: "#0A0C10", color: "#E2E8F0", fontFamily: "'JetBrains Mono', 'SF Mono', monospace" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Crimson+Pro:wght@400;500;600&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: #0A0C10; } ::-webkit-scrollbar-thumb { background: #1E293B; border-radius: 3px; }
        .chip { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; transition: all 0.15s; border: 1px solid transparent; user-select: none; white-space: nowrap; }
        .chip:hover { filter: brightness(1.3); } .chip.active { border-color: currentColor; filter: brightness(1.2); }
        .event-card { border-left: 3px solid; padding: 14px 16px; background: rgba(255,255,255,0.02); border-radius: 0 6px 6px 0; cursor: pointer; transition: all 0.2s; position: relative; }
        .event-card:hover { background: rgba(255,255,255,0.05); } .event-card.expanded { background: rgba(255,255,255,0.06); }
        .event-card.thread-glow { box-shadow: inset 0 0 20px rgba(255,255,255,0.03); }
        .mode-btn { padding: 6px 12px; border-radius: 4px; border: 1px solid #1E293B; background: transparent; color: #64748B; font-size: 10px; cursor: pointer; font-family: inherit; transition: all 0.15s; letter-spacing: 0.5px; }
        .mode-btn.active { background: #1E293B; color: #E2E8F0; border-color: #334155; } .mode-btn:hover { border-color: #334155; color: #94A3B8; }
        .clearBtn { font-size: 10px; color: #475569; cursor: pointer; background: none; border: 1px solid #1E293B; padding: 2px 8px; border-radius: 3px; font-family: inherit; }
        .clearBtn:hover { color: #94A3B8; border-color: #334155; }
        .precog-card { background: rgba(255,255,255,0.02); border: 1px solid #1A1D27; border-radius: 8px; padding: 16px; transition: all 0.2s; cursor: default; }
        .precog-card:hover { background: rgba(255,255,255,0.04); border-color: #2D3348; }
        .thread-pill { display: flex; align-items: center; gap: 8px; padding: 8px 14px; border-radius: 6px; cursor: pointer; transition: all 0.2s; border: 1px solid transparent; }
        .thread-pill:hover { filter: brightness(1.2); }
        .thread-pill.active { border-color: currentColor; }
        .bar { height: 18px; border-radius: 2px; min-width: 2px; transition: width 0.3s; }
        .momentum-spark { display: inline-flex; gap: 2px; align-items: flex-end; height: 16px; }
        .momentum-spark > div { width: 4px; border-radius: 1px; transition: height 0.3s; }
        @keyframes pulse-ring { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(1.6); opacity: 0; } }
        .pulse-dot { position: relative; }
        .pulse-dot::after { content: ''; position: absolute; inset: -4px; border-radius: 50%; border: 1px solid currentColor; animation: pulse-ring 2s ease-out infinite; }
      `}</style>

      {/* DOSSIER MODAL */}
      {dossierEntity && (
        <EntityDossier
          entityName={dossierEntity}
          events={EVENTS}
          threads={NARRATIVE_THREADS}
          onClose={() => setDossierEntity(null)}
        />
      )}

      {/* HEADER */}
      <div style={{ padding: "24px 28px 16px", borderBottom: "1px solid #131620", background: "linear-gradient(180deg, #0D1017, #0A0C10)" }}>
        <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", flexWrap: "wrap", gap: 12 }}>
          <div>
            <div style={{ fontSize: 9, letterSpacing: 3, color: "#475569", textTransform: "uppercase", marginBottom: 4 }}>
              Open Source Intelligence ˆ Horizon Scan
            </div>
            <h1 style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 22, fontWeight: 700, color: "#F1F5F9", letterSpacing: -0.5 }}>
              AI Intelligence Timeline
            </h1>
            <div style={{ fontSize: 11, color: "#475569", marginTop: 4 }}>
              {dates.length} days · {EVENTS.length} events · {allEntityNames.length} entities · {NARRATIVE_THREADS.length} threads · {PRECOGNITION_SIGNALS.length} forward signals
            </div>
          </div>
          <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
            {["timeline", "sphere", "entity-map", "precog", "momentum"].map(m => (
              <button key={m} className={`mode-btn ${viewMode === m ? "active" : ""}`} onClick={() => setViewMode(m)}>
                {m === "timeline" ? "≡ Timeline" : m === "sphere" ? "◉ Threat Sphere" : m === "entity-map" ? "⊞ Entity Map" : m === "precog" ? "⚡ Precognition" : "↗ Momentum"}
              </button>
            ))}
          </div>
        </div>
      </div>

      <div style={{ display: "flex", minHeight: "calc(100vh - 100px)" }}>
        {/* SIDEBAR */}
        <div style={{
          width: 240, flexShrink: 0, borderRight: "1px solid #131620",
          padding: "16px 14px", overflowY: "auto", maxHeight: "calc(100vh - 100px)",
          background: "rgba(13,16,23,0.8)",
        }}>
          {/* ENHANCEMENT 3: NARRATIVE THREADS */}
          <div style={{ marginBottom: 20 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
              <span style={{ fontSize: 9, letterSpacing: 2, color: "#475569", textTransform: "uppercase" }}>Narrative Threads</span>
              {activeThread && <button className="clearBtn" onClick={() => setActiveThread(null)}>Clear</button>}

                <div

                  className={`thread-pill ${activeThread === th.id ? "active" : ""}`}
                  style={{
                    color: th.color,
                    background: activeThread === th.id ? th.color + "15" : th.color + "06",
                    marginBottom: 4,
                  }}
                  onClick={() => setActiveThread(activeThread === th.id ? null : th.id)}
                >
                  <span style={{ fontSize: 14 }}>{th.icon}</span>

                    <div style={{ fontSize: 11, fontWeight: 500, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{th.label}</div>

                  <span style={{ fontSize: 9, color: ms.color, background: ms.bg, padding: "1px 5px", borderRadius: 3, letterSpacing: 0.5 }}>
                    {ms.icon}

                </div>
              );

          </div>

          {/* Categories */}
          <div style={{ marginBottom: 18 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
              <span style={{ fontSize: 9, letterSpacing: 2, color: "#475569", textTransform: "uppercase" }}>Categories</span>

          <div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>

            <div style={{ display: "flex", flexDirection: "column", gap: 1 }}>
              {entityFreq.map(([ent, count]) => {
                const info = ENTITIES[ent] || { color: "#94A3B8" };
                const isActive = activeEntities.has(ent);
                return (
                  <div key={ent} style={{ display: "flex", alignItems: "center", gap: 4 }}>

                      onClick={() => toggleEntity(ent)}>
                      <span style={{ display: "flex", alignItems: "center", gap: 5, overflow: "hidden" }}>
                        <span style={{ width: 5, height: 5, borderRadius: "50%", background: info.color, flexShrink: 0 }} />
                        <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{ent}</span>
                      </span>
                      <span style={{ opacity: 0.5, flexShrink: 0 }}>{count}</span>
                    </div>
                    <button style={{
                      background: "none", border: "1px solid #1E293B", color: "#475569",
                      width: 22, height: 22, borderRadius: 4, cursor: "pointer",
                      fontSize: 10, display: "flex", alignItems: "center", justifyContent: "center",
                      fontFamily: "inherit", flexShrink: 0,
                    }} onClick={() => setDossierEntity(ent)} title="Open Dossier">⊕</button>
                  </div>
                );
              })}
            </div>
          </div>
        </div>

        {/* MAIN CONTENT */}
        <div style={{ flex: 1, overflowY: "auto", maxHeight: "calc(100vh - 100px)", padding: "16px 20px" }}>

          {/*  TIMELINE VIEW  */}
          {viewMode === "timeline" && (
            <div>
              {/* Precog Quick Strip */}
              {showPrecog && (
                <div style={{ marginBottom: 20 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                    <span style={{ fontSize: 9, letterSpacing: 2, color: "#475569", textTransform: "uppercase" }}>‡ Forward Signals</span>
                    <button className="clearBtn" onClick={() => setShowPrecog(false)}>Hide</button>
                  </div>
                  <div style={{ display: "flex", gap: 8, overflowX: "auto", paddingBottom: 4 }}>
                    {PRECOGNITION_SIGNALS.filter(s => s.hoursOut <= 168).slice(0, 4).map(sig => {
                      const imp = IMPACT_STYLES[sig.impact];
                      return (
                        <div key={sig.id} style={{
                          minWidth: 200, padding: "10px 14px", borderRadius: 6,
                          background: imp.border + "08", border: `1px solid ${imp.border}25`,
                          flexShrink: 0,
                        }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }}>
                            <span className="pulse-dot" style={{ width: 6, height: 6, borderRadius: "50%", background: imp.border, color: imp.border, display: "inline-block" }} />
                            <span style={{ fontSize: 10, color: imp.border, fontWeight: 600 }}>{sig.eta}</span>
                            <span style={{ fontSize: 9, color: "#475569", marginLeft: "auto" }}>{Math.round(sig.probability * 100)}%</span>
                          </div>
                          <div style={{ fontSize: 12, color: "#E2E8F0", fontFamily: "'Crimson Pro', serif", lineHeight: 1.3 }}>{sig.title}</div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* Active thread summary */}
              {activeThread && (() => {
                const th = NARRATIVE_THREADS.find(t => t.id === activeThread);
                if (!th) return null;
                return (
                  <div style={{
                    marginBottom: 20, padding: "14px 18px", borderRadius: 8,
                    background: th.color + "08", borderLeft: `4px solid ${th.color}`,
                  }}>
                    <div style={{ fontSize: 14, fontWeight: 600, color: th.color, marginBottom: 4 }}>
                      {th.icon} {th.label}
                    </div>
                    <div style={{ fontSize: 13, color: "#94A3B8", fontFamily: "'Crimson Pro', serif", lineHeight: 1.5 }}>
                      {th.summary}
                    </div>
                  </div>
                );
              })()}

              {/* Stats */}
              <div style={{
                display: "flex", gap: 20, marginBottom: 20, padding: "10px 14px",
                background: "rgba(255,255,255,0.015)", borderRadius: 6, border: "1px solid #131620", flexWrap: "wrap",
              }}>
                <div>
                  <div style={{ fontSize: 9, color: "#475569", textTransform: "uppercase", letterSpacing: 1 }}>Showing</div>
                  <div style={{ fontSize: 16, fontWeight: 600, color: "#F1F5F9", fontFamily: "'Space Grotesk', sans-serif" }}>
                    {filtered.length}<span style={{ fontSize: 11, color: "#475569" }}>/{EVENTS.length}</span>
                  </div>
                </div>
                <div>
                  <div style={{ fontSize: 9, color: "#475569", textTransform: "uppercase", letterSpacing: 1 }}>Critical</div>
                  <div style={{ fontSize: 16, fontWeight: 600, color: "#EF4444", fontFamily: "'Space Grotesk', sans-serif" }}>
                    {filtered.filter(e => e.impact === "critical").length}
                  </div>
                </div>
                <div>
                  <div style={{ fontSize: 9, color: "#475569", textTransform: "uppercase", letterSpacing: 1 }}>Range</div>
                  <div style={{ fontSize: 12, color: "#94A3B8", marginTop: 2 }}>
                    {dates.length > 0 ? `${formatDate(dates[0])} →’ ${formatDate(dates[dates.length - 1])}` : "—"}
                  </div>
                </div>
              </div>

              {/* Day groups */}
              {dates.map(date => {
                const dayEvents = filtered.filter(e => e.date === date);
                if (dayEvents.length === 0) return null;
                return (
                  <div key={date} style={{ marginBottom: 28 }}>
                    <div style={{
                      display: "flex", alignItems: "center", gap: 12, marginBottom: 12,
                      position: "sticky", top: 0, zIndex: 10, background: "#0A0C10", paddingBottom: 6, paddingTop: 2,
                    }}>
                      <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 14, fontWeight: 600, color: "#F1F5F9" }}>
                        {formatDate(date)}
                      </div>
                      <div style={{ flex: 1, height: 1, background: "#131620" }} />
                      <div style={{ fontSize: 9, color: "#475569", letterSpacing: 1, background: "#0D1017", padding: "2px 8px", borderRadius: 3 }}>
                        {dayEvents.length} event{dayEvents.length !== 1 ? "s" : ""}
                      </div>
                    </div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 6, paddingLeft: 6 }}>
                      {dayEvents.map(ev => {
                        const imp = IMPACT_STYLES[ev.impact];
                        const isExpanded = expandedId === ev.id;
                        const isGlow = isThreadHighlighted(ev.id);
                        return (
                          <div key={ev.id}
                            className={`event-card ${isExpanded ? "expanded" : ""} ${isGlow ? "thread-glow" : ""}`}
                            style={{
                              borderLeftColor: isGlow && activeThread
                                ? NARRATIVE_THREADS.find(t => t.id === activeThread)?.color || imp.border
                                : imp.border,
                            }}
                            onClick={() => setExpandedId(isExpanded ? null : ev.id)}>
                            <div style={{ display: "flex", alignItems: "flex-start", gap: 10, justifyContent: "space-between" }}>
                              <div style={{ flex: 1 }}>
                                <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 5, flexWrap: "wrap" }}>
                                  <span style={{ fontSize: 8, fontWeight: 600, letterSpacing: 1, color: imp.badge, background: imp.badgeBg, padding: "2px 5px", borderRadius: 3, textTransform: "uppercase" }}>{imp.label}</span>
                                  <span style={{ fontSize: 9, color: CATEGORIES[ev.category], background: CATEGORIES[ev.category] + "10", padding: "2px 5px", borderRadius: 3 }}>{ev.category}</span>
                                  <span style={{ fontSize: 9, color: "#334155" }}>{ev.eventDate}</span>
                                  {isGlow && <span style={{ fontSize: 8, color: NARRATIVE_THREADS.find(t => t.id === activeThread)?.color, letterSpacing: 1 }}>ˆ THREAD</span>}
                                </div>
                                <div style={{ fontFamily: "'Crimson Pro', serif", fontSize: 14, fontWeight: 500, color: "#E2E8F0", lineHeight: 1.35 }}>{ev.title}</div>
                              </div>
                              <div style={{ display: "flex", gap: 2, flexShrink: 0, marginTop: 4 }}>
                                {ev.entities.map(ent => (
                                  <span key={ent} style={{ width: 7, height: 7, borderRadius: "50%", background: (ENTITIES[ent] || {}).color || "#94A3B8" }} title={ent} />
                                ))}
                              </div>
                            </div>
                            {isExpanded && (
                              <div style={{ marginTop: 10, paddingTop: 10, borderTop: "1px solid #1E293B" }}>
                                <p style={{ fontFamily: "'Crimson Pro', serif", fontSize: 13, lineHeight: 1.6, color: "#94A3B8", marginBottom: 10 }}>{ev.description}</p>
                                <div style={{ display: "flex", flexWrap: "wrap", gap: 3 }}>
                                  {ev.entities.map(ent => {
                                    const info = ENTITIES[ent] || { color: "#94A3B8" };
                                    return (
                                      <span key={ent} style={{ fontSize: 10, color: info.color, background: info.color + "12", padding: "2px 7px", borderRadius: 3, cursor: "pointer" }}
                                        onClick={e => { e.stopPropagation(); setDossierEntity(ent); }}>
                                        {ent}
                                      </span>
                                    );
                                  })}
                                </div>
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
              {filtered.length === 0 && <div style={{ textAlign: "center", padding: 60, color: "#334155" }}>No events match filters.</div>}
            </div>
          )}

          {/*  THREAT SPHERE VIEW  */}
          {viewMode === "sphere" && (
            <div>
              <ThreatSphere events={EVENTS} onSelectEntity={setDossierEntity} />
              <div style={{ marginTop: 16, fontSize: 11, color: "#475569", textAlign: "center" }}>
                Click any entity node to open its dossier. Inner ring = highest frequency. Red halos = critical threat entities.
              </div>
            </div>
          )}

          {/*  PRECOGNITION VIEW  */}
          {viewMode === "precog" && (
            <div>
              <div style={{ fontSize: 9, letterSpacing: 2, color: "#475569", textTransform: "uppercase", marginBottom: 16 }}>
                ‡ Precognition Signals — Forward-Looking Intelligence
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                {PRECOGNITION_SIGNALS.map(sig => {
                  const imp = IMPACT_STYLES[sig.impact];
                  const thread = NARRATIVE_THREADS.find(t => t.id === sig.threadId);
                  return (
                    <div key={sig.id} className="precog-card" style={{ borderColor: imp.border + "30" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                        <div>
                          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                            <span className="pulse-dot" style={{ width: 8, height: 8, borderRadius: "50%", background: imp.border, color: imp.border, display: "inline-block" }} />
                            <span style={{ fontSize: 9, fontWeight: 600, letterSpacing: 1, color: imp.badge, background: imp.badgeBg, padding: "2px 6px", borderRadius: 3, textTransform: "uppercase" }}>{imp.label}</span>
                            {thread && (
                              <span style={{ fontSize: 9, color: thread.color, background: thread.color + "12", padding: "2px 6px", borderRadius: 3 }}>
                                {thread.icon} {thread.label}
                              </span>
                            )}
                          </div>
                          <h3 style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 16, fontWeight: 600, color: "#F1F5F9", margin: 0 }}>{sig.title}</h3>
                        </div>
                        <div style={{ textAlign: "right", flexShrink: 0 }}>
                          <div style={{ fontSize: 9, color: "#475569", letterSpacing: 1 }}>ETA</div>
                          <div style={{ fontSize: 14, fontWeight: 600, color: sig.hoursOut <= 48 ? "#EF4444" : "#F59E0B", fontFamily: "'Space Grotesk', sans-serif" }}>{sig.eta}</div>
                        </div>
                      </div>

                      <p style={{ fontFamily: "'Crimson Pro', serif", fontSize: 14, lineHeight: 1.5, color: "#94A3B8", marginBottom: 12 }}>{sig.description}</p>

                      {/* Probability bar */}
                      <div style={{ marginBottom: 12 }}>
                        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                          <span style={{ fontSize: 9, color: "#475569", letterSpacing: 1 }}>PROBABILITY</span>
                          <span style={{ fontSize: 11, color: "#E2E8F0", fontWeight: 600 }}>{Math.round(sig.probability * 100)}%</span>
                        </div>
                        <div style={{ height: 6, background: "#131620", borderRadius: 3, overflow: "hidden" }}>
                          <div style={{
                            height: "100%", borderRadius: 3,
                            width: `${sig.probability * 100}%`,
                            background: `linear-gradient(90deg, ${imp.border}60, ${imp.border})`,
                          }} />
                        </div>
                      </div>

                      {/* Cascade Risk */}
                      <div style={{
                        padding: "10px 14px", borderRadius: 6,
                        background: "rgba(239,68,68,0.04)", border: "1px solid rgba(239,68,68,0.1)",
                      }}>
                        <div style={{ fontSize: 9, letterSpacing: 1.5, color: "#EF4444", marginBottom: 4 }}>CASCADE RISK</div>
                        <div style={{ fontSize: 12, color: "#CBD5E1", fontFamily: "'Crimson Pro', serif", lineHeight: 1.4 }}>{sig.cascadeRisk}</div>
                      </div>

                      {/* Trigger entities */}
                      <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginTop: 10 }}>
                        {sig.triggerEntities.map(ent => {
                          const info = ENTITIES[ent] || { color: "#94A3B8" };
                          return (
                            <span key={ent} style={{ fontSize: 10, color: info.color, background: info.color + "12", padding: "2px 8px", borderRadius: 3, cursor: "pointer" }}
                              onClick={() => setDossierEntity(ent)}>
                              {ent}
                            </span>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/*  ENTITY MAP VIEW  */}
          {viewMode === "entity-map" && (
            <div>
              <div style={{ fontSize: 9, letterSpacing: 2, color: "#475569", textTransform: "uppercase", marginBottom: 16 }}>
                ⊞ Entity Frequency & Co-Occurrence
              </div>
              <div style={{ marginBottom: 24 }}>
                <div style={{ fontSize: 11, color: "#94A3B8", marginBottom: 8, fontWeight: 500 }}>Event Frequency</div>
                {entityFreq.map(([ent, count]) => {
                  const info = ENTITIES[ent] || { color: "#94A3B8" };
                  const max = entityFreq[0][1];
                  return (
                    <div key={ent} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4, cursor: "pointer" }}
                      onClick={() => setDossierEntity(ent)}>
                      <span style={{ fontSize: 10, color: info.color, width: 140, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", textAlign: "right" }}>{ent}</span>
                      <div style={{ flex: 1, background: "#0D1017", borderRadius: 2, height: 16 }}>
                        <div className="bar" style={{ width: `${(count / max) * 100}%`, background: `linear-gradient(90deg, ${info.color}35, ${info.color}85)`, height: 16 }} />
                      </div>
                      <span style={{ fontSize: 10, color: "#475569", width: 18, textAlign: "right" }}>{count}</span>
                    </div>
                  );
                })}
              </div>
              <div style={{ marginBottom: 24 }}>
                <div style={{ fontSize: 11, color: "#94A3B8", marginBottom: 8, fontWeight: 500 }}>Co-Occurrence</div>
                {entityMatrix.map(({ entities: [a, b], count }, i) => {
                  const infoA = ENTITIES[a] || { color: "#94A3B8" };
                  const infoB = ENTITIES[b] || { color: "#94A3B8" };
                  return (
                    <div key={i} style={{ padding: "5px 10px", borderRadius: 4, display: "flex", alignItems: "center", gap: 6, background: "rgba(255,255,255,0.02)", marginBottom: 3 }}>
                      <span style={{ width: 6, height: 6, borderRadius: "50%", background: infoA.color }} />
                      <span style={{ fontSize: 10, color: infoA.color }}>{a}</span>
                      <span style={{ fontSize: 9, color: "#1E293B" }}>Ã—</span>
                      <span style={{ width: 6, height: 6, borderRadius: "50%", background: infoB.color }} />
                      <span style={{ fontSize: 10, color: infoB.color }}>{b}</span>
                      <span style={{ marginLeft: "auto", fontSize: 10, color: "#475569" }}>{count}Ã—</span>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/*  MOMENTUM VIEW  */}
          {viewMode === "momentum" && (
            <div>
              <div style={{ fontSize: 9, letterSpacing: 2, color: "#475569", textTransform: "uppercase", marginBottom: 16 }}>
                →— Signal Momentum — Category Velocity Across Briefing Days
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {signalMomentum.map(({ category, values, recent, delta }) => {
                  const catColor = CATEGORIES[category] || "#94A3B8";
                  const maxVal = Math.max(...values, 1);
                  const isRising = delta > 0;
                  return (
                    <div key={category} style={{
                      padding: "14px 18px", borderRadius: 8, background: "rgba(255,255,255,0.02)",
                      border: "1px solid #131620",
                    }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                          <span style={{ width: 8, height: 8, borderRadius: "50%", background: catColor }} />
                          <span style={{ fontSize: 13, color: catColor, fontWeight: 500 }}>{category}</span>
                        </div>
                        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                          <span style={{
                            fontSize: 11, fontWeight: 600,
                            color: delta > 30 ? "#EF4444" : delta > 0 ? "#F59E0B" : delta === 0 ? "#64748B" : "#6EE7B7",
                          }}>
                            {isRising ? "²" : delta === 0 ? "—" : "¼"} {Math.abs(Math.round(delta))}%
                          </span>
                          <span style={{ fontSize: 10, color: "#475569" }}>{recent} latest</span>
                        </div>
                      </div>

                      {/* Sparkline bars */}
                      <div style={{ display: "flex", alignItems: "flex-end", gap: 4, height: 40 }}>
                        {values.map((v, i) => (
                          <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
                            <div style={{
                              width: "100%", maxWidth: 60,
                              height: Math.max(4, (v / maxVal) * 36),
                              background: i === values.length - 1
                                ? `linear-gradient(180deg, ${catColor}, ${catColor}80)`
                                : `${catColor}30`,
                              borderRadius: 2,
                              transition: "height 0.4s",
                            }} />
                          </div>
                        ))}
                      </div>
                      <div style={{ display: "flex", gap: 4, marginTop: 4 }}>
                        {dates.map((d, i) => (
                          <div key={i} style={{ flex: 1, textAlign: "center", fontSize: 9, color: "#334155", maxWidth: 60 }}>
                            {new Date(d + "T12:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" })}
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>

              {/* Narrative thread momentum */}
              <div style={{ marginTop: 24 }}>
                <div style={{ fontSize: 9, letterSpacing: 2, color: "#475569", textTransform: "uppercase", marginBottom: 12 }}>
                  Narrative Thread Velocity
                </div>
                {NARRATIVE_THREADS.map(th => {
                  const ms = MOMENTUM_STYLES[th.momentum];
                  const evCount = th.eventIds.length;
                  const days = new Set(th.eventIds.map(eid => EVENTS.find(e => e.id === eid)?.date).filter(Boolean));
                  return (
                    <div key={th.id} style={{
                      padding: "12px 16px", borderRadius: 8, marginBottom: 8,
                      background: th.color + "06", borderLeft: `3px solid ${th.color}`,
                      cursor: "pointer",
                    }} onClick={() => { setActiveThread(th.id); setViewMode("timeline"); }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                          <span style={{ fontSize: 14 }}>{th.icon}</span>
                          <span style={{ fontSize: 13, color: th.color, fontWeight: 600 }}>{th.label}</span>
                        </div>
                        <span style={{
                          fontSize: 10, fontWeight: 600, color: ms.color, background: ms.bg,
                          padding: "3px 8px", borderRadius: 4, letterSpacing: 0.5, textTransform: "uppercase",
                        }}>
                          {ms.icon} {th.momentum}
                        </span>
                      </div>
                      <div style={{ fontSize: 12, color: "#94A3B8", fontFamily: "'Crimson Pro', serif", lineHeight: 1.4, marginBottom: 6 }}>{th.summary}</div>
                      <div style={{ fontSize: 10, color: "#475569" }}>
                        {evCount} events across {days.size} day{days.size !== 1 ? "s" : ""}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<AITimeline />);

</script>
</body>
</html>
